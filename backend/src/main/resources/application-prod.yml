spring:
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASS}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true

  data:
    mongodb:
      uri: ${MONGO_URI}
      database: meeting_minutes
      auto-index-creation: true
      uuid-representation: standard

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
        provider:
          google:
            issuer-uri: https://accounts.google.com
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
    org.hibernate.tool.schema.internal: WARN

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

app:
  upload:
    temp-directory: /tmp/uploads
    max-file-size: 524288000
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}
  email:
    from: team.meetingminutes@gmail.com
    base-url: http://localhost:5173
  search:
    max-results: 1000
    default-page-size: 20
    enable-full-text: true
    highlight-fragment-size: 200
    highlight-max-fragments: 3

ai:
  service:
    base-url: ${AI_SERVICE_URL}
    timeout: 300000  # 5 minutes in milliseconds
    retry:
      max-attempts: 3
      backoff-delay: 5000

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      aiService:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  ratelimiter:
    instances:
      authEndpoints:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 5s
      fileUpload:
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 10s
      aiProcessing:
        limit-for-period: 3
        limit-refresh-period: 1m
        timeout-duration: 30s

